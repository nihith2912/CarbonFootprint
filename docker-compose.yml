version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ecotrack
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespass123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecotrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-ecotrack-ai-super-secret-key-production-ready
      - ALLOWED_HOSTS=web,localhost,127.0.0.1
      - DB_NAME=ecotrack
      - DB_USER=postgres
      - DB_PASSWORD=postgrespass123
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
